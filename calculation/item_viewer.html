<script src="data/items_extra.js"></script>
<script>
(function () {
    const statusEl = document.getElementById('item-viewer-status');
    const hostEl = document.getElementById('item-viewer-host');
    const titleEl = document.getElementById('item-viewer-title');

    function getParam(name) {
        const m = new URLSearchParams(window.location.search);
        return m.get(name);
    }

    function normalizeId(raw) {
        if (!raw) return null;
        let s = String(raw).trim().toLowerCase();
        if (s.startsWith('0x')) s = s.slice(2);
        const n = parseInt(s, 16);
        if (isNaN(n)) return null;
        return '0x' + n.toString(16).padStart(4, '0');
    }

    // Nx オーバーレイ JSON（items_full_nx_<t>.json）は存在しない type も多いので、
    // 404 は正常ケースとして扱い、例外化しない。ネット起因の失敗は握りつぶし、
    // フォールバックで通常 HTML を表示する。
    async function fetchNxOverlay(tNum, noCache) {
        const url = 'data/items_full_nx_' + tNum + '.json'
                  + (noCache ? ('?_=' + Date.now()) : '');
        try {
            const res = await fetch(url, noCache ? { cache: 'no-cache' } : {});
            if (!res.ok) return null;  // 404 含む: そのtypeにNxペアが無い
            return await res.json();
        } catch (e) {
            return null;
        }
    }

    // items_extra.js の ItemExtraInfoList から補足情報を引く。
    // キーは 10進 int / 16進リテラル / "0xNNNN" 文字列いずれも可。
    // 値は ["行1", "行2", ...] または { heading, lines: [...] } の2形式。
    function lookupExtra(idHex) {
        if (typeof ItemExtraInfoList === 'undefined') return null;
        const idNum = parseInt(idHex, 16);
        const raw = ItemExtraInfoList[idNum] != null
                  ? ItemExtraInfoList[idNum]
                  : ItemExtraInfoList[idHex];
        if (!raw) return null;
        if (Array.isArray(raw)) {
            return raw.length ? { heading: '入手方法', lines: raw } : null;
        }
        if (typeof raw === 'object' && Array.isArray(raw.lines) && raw.lines.length) {
            return { heading: raw.heading || '入手方法', lines: raw.lines };
        }
        return null;
    }

    // 補足テキストが定義されているときだけ、末尾に追加行を差し込む。
    // 補足が無いときは何もしない（既存表示を変更しない）。
    function injectExtra(idHex) {
        const extra = lookupExtra(idHex);
        if (!extra) return;
        const table = hostEl.querySelector('table#table1');
        if (!table) return;
        const tbody = table.querySelector('tbody') || table;

        // 既存の colspan 最大値を拾って行幅を決める（5col/12col 両対応）
        let maxCs = 0;
        table.querySelectorAll('td[colspan], th[colspan]').forEach(function (el) {
            const cs = parseInt(el.getAttribute('colspan'), 10);
            if (!isNaN(cs) && cs > maxCs) maxCs = cs;
        });
        if (maxCs < 1) maxCs = 5;

        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.setAttribute('colspan', String(maxCs));
        td.setAttribute('valign', 'top');
        td.style.backgroundColor = '#888888';
        const headingHtml = '<font color="#00f8f8">&lt;' + extra.heading + '&gt;</font><br>';
        const bodyHtml = extra.lines.map(function (line) { return line + '<br>'; }).join('');
        td.innerHTML = headingHtml + bodyHtml;
        tr.appendChild(td);
        tbody.appendChild(tr);
    }

    function applyTitleFrom(html) {
        // タイトル更新（先頭 th の font 文字列 or 生 th テキスト）
        const m = /<th[^>]*>\s*<font[^>]*>\s*(?:<font[^>]*>)?([^<]+)/.exec(html)
               || /<th[^>]*>\s*([^<]+)<\/th>/.exec(html);
        if (m && m[1]) {
            const name = m[1].trim();
            titleEl.textContent = name;
            document.title = name + ' - 赤石の民衆';
        }
    }

    // スマホ幅のとき、アイコン rowspan="2" を1行に減らして、空いた1セル分を
    // 要求能力値セルに吸収させて読みやすくする。
    // 通常ULT (5列): 要求能力値 colspan 1 → 2
    // Nx (12列): 要求能力値 colspan 1 → 3 (アイコン分 +1, 着用可能な職業 colspan 4→3 から +1)
    function adjustMobileLayout() {
        const isMobile = window.matchMedia('(max-width: 768px)').matches;
        if (!isMobile) return;
        const table = hostEl.querySelector('table#table1');
        if (!table) return;
        const iconCells = table.querySelectorAll('td[rowspan="2"]');
        if (iconCells.length === 0) return;
        iconCells.forEach(function(td) { td.removeAttribute('rowspan'); });
        const tbody = table.querySelector('tbody');
        if (!tbody) return;
        const trs = tbody.querySelectorAll(':scope > tr');
        for (const tr of trs) {
            const tds = tr.querySelectorAll(':scope > td');
            for (let i = 0; i < tds.length; i++) {
                const td = tds[i];
                const text = td.textContent || '';
                if (text.indexOf('要求能力値') === -1 && text.indexOf('要求能力') === -1) continue;
                const current = parseInt(td.getAttribute('colspan') || '1', 10);
                let newColspan = current + 1;
                if (i + 1 < tds.length) {
                    const next = tds[i + 1];
                    const nextText = next.textContent || '';
                    if (nextText.indexOf('着用可能な職業') !== -1) {
                        const nextColspan = parseInt(next.getAttribute('colspan') || '1', 10);
                        if (nextColspan >= 2) {
                            next.setAttribute('colspan', String(nextColspan - 1));
                            newColspan += 1;
                        }
                    }
                }
                td.setAttribute('colspan', String(newColspan));
            }
        }
    }

    async function load() {
        const idHex = normalizeId(getParam('id'));
        const t = getParam('t');
        if (!idHex || t === null) {
            statusEl.textContent = '不正なURLです (?id=0xNNNN&t=N)';
            return;
        }
        const tNum = parseInt(t, 10);
        if (isNaN(tNum)) {
            statusEl.textContent = '不正なtype指定: ' + t;
            return;
        }

        // 通常 JSON と Nx オーバーレイを並行 fetch
        const url = 'data/items_full_' + tNum + '.json';
        try {
            const [res, nxBucket] = await Promise.all([
                fetch(url),
                fetchNxOverlay(tNum, false),
            ]);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const bucket = await res.json();

            // Nx オーバーレイ優先: 通常 ID / Nx ID どちらで到達しても 12 カラム版に切替
            const nxHtml = nxBucket && nxBucket[idHex];
            const html = nxHtml || bucket[idHex];
            if (!html) {
                statusEl.textContent = 'アイテムが見つかりません: id=' + idHex + ' / type=' + tNum;
                return;
            }
            hostEl.innerHTML = html;
            statusEl.style.display = 'none';
            applyTitleFrom(html);
            injectExtra(idHex);
            adjustMobileLayout();
        } catch (e) {
            statusEl.textContent = '読み込み失敗: ' + e.message;
        }
    }

    async function loadNoCache() {
        const idHex = normalizeId(getParam('id'));
        const t = getParam('t');
        if (!idHex || t === null) return;
        const tNum = parseInt(t, 10);
        if (isNaN(tNum)) return;

        const btn = document.getElementById('btn-cache-reload');
        btn.textContent = '更新中...';
        btn.disabled = true;

        const url = 'data/items_full_' + tNum + '.json?_=' + Date.now();
        try {
            const [res, nxBucket] = await Promise.all([
                fetch(url, { cache: 'no-cache' }),
                fetchNxOverlay(tNum, true),
            ]);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const bucket = await res.json();
            const nxHtml = nxBucket && nxBucket[idHex];
            const html = nxHtml || bucket[idHex];
            if (html) {
                hostEl.innerHTML = html;
                statusEl.style.display = 'none';
                applyTitleFrom(html);
                injectExtra(idHex);
                adjustMobileLayout();
            }
            btn.textContent = '更新完了';
            setTimeout(function() { btn.textContent = 'キャッシュ更新'; btn.disabled = false; }, 1500);
        } catch (e) {
            btn.textContent = '更新失敗';
            setTimeout(function() { btn.textContent = 'キャッシュ更新'; btn.disabled = false; }, 2000);
        }
    }
    window.reloadNoCache = loadNoCache;

    load().then(function() {
        document.getElementById('btn-cache-reload').style.display = '';
    });
})();
</script>
