<script>
(function () {
    const statusEl = document.getElementById('item-viewer-status');
    const hostEl = document.getElementById('item-viewer-host');
    const titleEl = document.getElementById('item-viewer-title');

    function getParam(name) {
        const m = new URLSearchParams(window.location.search);
        return m.get(name);
    }

    function normalizeId(raw) {
        if (!raw) return null;
        let s = String(raw).trim().toLowerCase();
        if (s.startsWith('0x')) s = s.slice(2);
        const n = parseInt(s, 16);
        if (isNaN(n)) return null;
        return '0x' + n.toString(16).padStart(4, '0');
    }

    async function load() {
        const idHex = normalizeId(getParam('id'));
        const t = getParam('t');
        if (!idHex || t === null) {
            statusEl.textContent = '不正なURLです (?id=0xNNNN&t=N)';
            return;
        }
        const tNum = parseInt(t, 10);
        if (isNaN(tNum)) {
            statusEl.textContent = '不正なtype指定: ' + t;
            return;
        }

        const url = 'data/items_full_' + tNum + '.json';
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const bucket = await res.json();
            const html = bucket[idHex];
            if (!html) {
                statusEl.textContent = 'アイテムが見つかりません: id=' + idHex + ' / type=' + tNum;
                return;
            }
            hostEl.innerHTML = html;
            statusEl.style.display = 'none';

            // タイトル更新（先頭テーブルの thead 文字列を抽出）
            const m = /<th[^>]*>\s*<font[^>]*>([^<]+)<\/font>/.exec(html)
                   || /<th[^>]*>\s*([^<]+)<\/th>/.exec(html);
            if (m && m[1]) {
                const name = m[1].trim();
                titleEl.textContent = name;
                document.title = name + ' - 赤石の民衆';
            }
        } catch (e) {
            statusEl.textContent = '読み込み失敗: ' + e.message;
        }
    }

    async function loadNoCache() {
        const idHex = normalizeId(getParam('id'));
        const t = getParam('t');
        if (!idHex || t === null) return;
        const tNum = parseInt(t, 10);
        if (isNaN(tNum)) return;

        const btn = document.getElementById('btn-cache-reload');
        btn.textContent = '更新中...';
        btn.disabled = true;

        const url = 'data/items_full_' + tNum + '.json?_=' + Date.now();
        try {
            const res = await fetch(url, { cache: 'no-cache' });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const bucket = await res.json();
            const html = bucket[idHex];
            if (html) {
                hostEl.innerHTML = html;
                statusEl.style.display = 'none';
            }
            btn.textContent = '更新完了';
            setTimeout(function() { btn.textContent = 'キャッシュ更新'; btn.disabled = false; }, 1500);
        } catch (e) {
            btn.textContent = '更新失敗';
            setTimeout(function() { btn.textContent = 'キャッシュ更新'; btn.disabled = false; }, 2000);
        }
    }
    window.reloadNoCache = loadNoCache;

    load().then(function() {
        document.getElementById('btn-cache-reload').style.display = '';
    });
})();
</script>
