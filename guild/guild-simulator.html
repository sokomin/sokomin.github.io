        { group: '支援バフ', key: 'move-speed', name: '移動速度', values: [95, 110, 125, 140, 155], unit: '%' },
        { group: '攻撃バフ', key: 'physical-damage', name: '物理ダメージ', values: [30, 35, 40, 45, 50], unit: '%' },
        { group: '攻撃バフ', key: 'magic-damage', name: '魔法ダメージ', values: [25, 29, 33, 37, 41], unit: '%' },
        { group: '攻撃バフ', key: 'attack-speed', name: '攻撃速度', values: [35, 40, 45, 50, 55], unit: '%' },
        { group: '攻撃バフ', key: 'all-attr-weaken', name: 'ターゲットの全属性抵抗弱化', values: [20, 23, 26, 29, 32], unit: '%' },
        { group: '攻撃バフ', key: 'extra-fire-damage', name: '追加火属性ダメージ', values: [700, 800, 900, 1000, 1100], unit: '' },
        { group: '防御バフ', key: 'defense', name: '防御力', values: [240, 280, 320, 360, 400], unit: '%' },
        { group: '防御バフ', key: 'hp-recovery', name: 'HP自動回復速度（毎秒）', values: [21, 25, 29, 33, 37], unit: '' },
        { group: '防御バフ', key: 'evasion', name: '回避率', values: [13, 15, 17, 19, 21], unit: '%' },
        { group: '防御バフ', key: 'max-hp', name: '最大HP', values: [120, 140, 160, 180, 200], unit: '%' },
        { group: '防御バフ', key: 'magic-resist', name: '魔法抵抗', values: [5, 10, 15, 20, 25], unit: '%' },
        { group: 'アイテム補給', key: 'item-supply', name: 'ギルド協力BOX', values: [1, 2, 3], unit: '段階' },
      ];

      const TABS = [
        { id: 'skills', label: 'ギルドスキル', panelId: 'gs-skills' },
        { id: 'statues', label: 'ギルド石像', panelId: 'gs-statues' },
        { id: 'flags', label: 'ギルド旗', panelId: 'gs-flags' },
      ];

      const state = {
        guildLv: 200,
        heavenlyBonus: 0,
        position: 'new',
        job: 0,
        rebirth: 0,
        skills: {},
        statues: {},
        flag: {},
        activeTab: 'skills',
      };

      const $ = (id) => document.getElementById(id);
      const positionFor = () => POSITIONS.find((position) => position.id === state.position) || POSITIONS[3];
      const skillByKey = (key) => GUILD_SKILLS.find((skill) => skill.key === key) || null;
      const guildPointCap = () => Math.max(1, Math.min(200, Number(state.guildLv) || 1)) + Math.max(0, Math.min(40, Number(state.heavenlyBonus) || 0));
      const usedPoints = () => GUILD_SKILLS.reduce((total, skill) => total + (Number(state.skills[skill.key]) || 0), 0);
      const prerequisitesMet = (skill) => !skill.requires || skill.requires.every((key) => (Number(state.skills[key]) || 0) >= 1);
      const statueLevel = (statueId, partIndex) => Number(state.statues[statueId]?.[partIndex]) || 0;
      const statueActive = (statue) => statue.parts.filter((_, index) => statueLevel(statue.id, index) > 0).length >= 3;

      function pruneSkills() {
        let changed = true;
        while (changed) {
          changed = false;
          for (const skill of GUILD_SKILLS) {
            if ((Number(state.skills[skill.key]) || 0) > 0 && !prerequisitesMet(skill)) {
              delete state.skills[skill.key];
              changed = true;
            }
          }
        }
        let excess = usedPoints() - guildPointCap();
        if (excess <= 0) return;
        for (const skill of [...GUILD_SKILLS].reverse()) {
          if (excess <= 0) break;
          const current = Number(state.skills[skill.key]) || 0;
          const removed = Math.min(current, excess);
          const next = current - removed;
          if (next) state.skills[skill.key] = next;
          else delete state.skills[skill.key];
          excess -= removed;
        }
      }

      function addResult(results, key, label, amount, unit, source) {
        if (!amount) return;
        if (!results[key]) results[key] = { label, amount: 0, unit, sources: [] };
        results[key].amount += amount;
        if (source) results[key].sources.push(source);
      }

      function buildResults() {
        const results = {};
        const position = positionFor();
        for (const skill of GUILD_SKILLS) {
          const level = Number(state.skills[skill.key]) || 0;
          if (!level) continue;
          if (skill.kind === 'display') addResult(results, `${skill.displayLabel}|${skill.unit}`, skill.displayLabel, level * skill.displayFactor, skill.unit, skill.name);
          if (skill.kind === 'ranked') addResult(results, `${skill.label}|`, skill.label, level * position.statFactor, '', skill.name);
          if (skill.kind === 'hp') addResult(results, 'HP|', 'HP', level * position.hpFactor, '', skill.name);
          if (skill.kind === 'cp') addResult(results, 'CP|', 'CP', level * position.cpFactor, '', skill.name);
          if (skill.kind === 'rate') addResult(results, `${skill.label}|%`, skill.label, level * position.rateFactor, '%', skill.name);
          if (skill.kind === 'biology' && state.rebirth === skill.rebirth) addResult(results, `転生${skill.rebirth}回時の獲得経験値|%`, `転生${skill.rebirth}回時の獲得経験値`, level * (5 + skill.rebirth), '%', skill.name);
          if (skill.kind === 'field-stat') addResult(results, 'フィールド能力値低下の回復|%', 'フィールド能力値低下の回復', 0.5 + level * 0.5, '%', skill.name);
          if (skill.kind === 'field-attr') addResult(results, 'フィールド最大属性抵抗低下の回復|%', 'フィールド最大属性抵抗低下の回復', 0.5 + level * 0.5, '%', skill.name);
          if (skill.kind === 'job' && state.job === skill.jobId) {
            addResult(results, 'job-skill', `${JOBS.find(([id]) => id === state.job)?.[1] || '対象職業'}のスキルLv`, Math.floor(level / position.skillDivisor), '', skill.name);
          }
        }
        for (const statue of STATUES) {
          if (!statueActive(statue)) continue;
          statue.parts.forEach((part, index) => {
            const level = statueLevel(statue.id, index);
            if (!level || !part[2]) return;
            const amount = part[3] === 'table' ? part[4][level - 1] : level * part[4];
            const labels = Array.isArray(part[2]) ? part[2] : [part[2]];
            labels.forEach((label) => addResult(results, `${label}|${part[5] || ''}`, label, amount, part[5] || '', `${statue.name} ${part[0]}`));
          });
        }
        for (const effect of FLAG_EFFECTS) {
          const level = Number(state.flag[effect.key]) || 0;
          if (!level) continue;
          addResult(results, `${effect.name}|${effect.unit}`, effect.name, effect.values[level - 1], effect.unit, 'ギルド旗');
        }
        return Object.values(results);
      }

      function renderSettings() {
        const cap = guildPointCap();
        const used = usedPoints();
        const left = Math.max(0, cap - used);
        const positionOptions = POSITIONS.map((position) => `<option value="${position.id}" ${state.position === position.id ? 'selected' : ''}>${position.label}</option>`).join('');
        const jobOptions = JOBS.map(([id, name]) => `<option value="${id}" ${state.job === id ? 'selected' : ''}>${name}</option>`).join('');
        const rebirthOptions = [0, 1, 2, 3, 4, 5].map((value) => `<option value="${value}" ${state.rebirth === value ? 'selected' : ''}>${value}回</option>`).join('');
        $('gs-settings').innerHTML = `<h2>基本設定</h2><div class="gs-controls">
          <label>ギルドLv<input id="gs-guild-level" type="number" min="1" max="200" value="${state.guildLv}"></label>
          <label>天上ボーナス<input id="gs-heavenly-bonus" type="number" min="0" max="40" value="${state.heavenlyBonus}"></label>
          <label>職位<select id="gs-position">${positionOptions}</select></label>
          <label>職業<select id="gs-job">${jobOptions}</select></label>
          <label>転生回数<select id="gs-rebirth">${rebirthOptions}</select></label>
        </div><div class="gs-gsp">残りGSP <strong>${left}</strong> / ${cap}（使用 ${used}）</div>
        <div class="gs-actions"><button type="button" class="gs-button gs-secondary" id="gs-reset">すべてリセット</button></div>
        <p class="gs-note">職位によって能力値・HP/CP・命中/回避・職業別スキルの補正値が変わります。職業と転生回数は、対象となるギルドスキルの効果集計に使います。</p>`;
      }

      function renderSummary() {
        const results = buildResults();
        if (!results.length) {
          $('gs-summary').innerHTML = '<h2>反映効果</h2><div class="gs-summary-empty">スキル・石像・旗を設定すると、ここに効果が表示されます。</div>';
          return;
        }
        const rows = results.map((result) => `<tr><td>${result.label}</td><td class="gs-summary-value">+${Number.isInteger(result.amount) ? result.amount : result.amount.toFixed(1)}${result.unit}</td><td>${result.sources.join(' / ')}</td></tr>`).join('');
        $('gs-summary').innerHTML = `<h2>反映効果</h2><div class="gs-table-wrap"><table id="table10"><tbody><tr><th>効果</th><th>反映値</th><th>主な取得元</th></tr>${rows}</tbody></table></div>`;
      }

      function skillRow(skill, pointsLeft) {
        const level = Number(state.skills[skill.key]) || 0;
        const canAdd = level < skill.max && pointsLeft > 0 && prerequisitesMet(skill);
        const canMax = level < skill.max && pointsLeft > 0 && prerequisitesMet(skill);
        const requirement = skill.requires ? `<div class="gs-requirement">必要: ${skill.requires.map((key) => `${skillByKey(key)?.name || key} Lv1`).join(' / ')}</div>` : '';
        return `<tr><th class="gs-skill-name">${skill.name}<div class="gs-effect">${skill.effect}</div>${requirement}</th><td class="gs-level-control"><button type="button" data-skill="${skill.key}" data-delta="-1" ${level <= 0 ? 'disabled' : ''}>−</button><span>Lv ${level} / ${skill.max}</span><button type="button" data-skill="${skill.key}" data-delta="1" ${canAdd ? '' : 'disabled'}>＋</button><button type="button" class="gs-skill-max" data-skill-max="${skill.key}" title="${skill.name}を最大Lvまで上げる" ${canMax ? '' : 'disabled'}>最大</button></td></tr>`;
      }

      function renderSkills() {
        const pointsLeft = Math.max(0, guildPointCap() - usedPoints());
        const sections = [
          ['ギルド運営・基礎', GUILD_SKILLS.slice(0, 9)],
          ['生体学', GUILD_SKILLS.filter((skill) => skill.kind === 'biology')],
          ['能力値・フィールド補正', GUILD_SKILLS.filter((skill) => ['ranked', 'field-stat', 'field-attr'].includes(skill.kind))],
          ['職業別スキル', GUILD_SKILLS.filter((skill) => skill.kind === 'job')],
        ];
        const html = sections.map(([name, skills]) => `<h3>${name}</h3><div class="gs-table-wrap"><table id="table10"><tbody><tr><th>スキル</th><th>割り振り</th></tr>${skills.map((skill) => skillRow(skill, pointsLeft)).join('')}</tbody></table></div><br>`).join('');
        $('gs-skills').innerHTML = `<h2>ギルドスキル</h2>${html}`;
      }

      function renderFlags() {
        const groups = [...new Set(FLAG_EFFECTS.map((effect) => effect.group))];
        const html = groups.map((group) => {
          const rows = FLAG_EFFECTS.filter((effect) => effect.group === group).map((effect) => {
            const level = Number(state.flag[effect.key]) || 0;
            const options = [0, ...effect.values.map((_, index) => index + 1)].map((value) => `<option value="${value}" ${level === value ? 'selected' : ''}>${value === 0 ? '未使用' : `Lv ${value}`}</option>`).join('');
            const amount = level ? `+${effect.values[level - 1]}${effect.unit}` : '—';
            return `<tr><th>${effect.name}</th><td class="gs-summary-value">${amount}</td><td><select class="gs-select" data-flag="${effect.key}">${options}</select></td></tr>`;
          }).join('');
          return `<h3>${group}</h3><div class="gs-table-wrap"><table id="table10"><tbody><tr><th>効果</th><th>反映値</th><th>旗Lv</th></tr>${rows}</tbody></table></div><br>`;
        }).join('');
        $('gs-flags').innerHTML = `<h2>ギルド旗</h2><p class="gs-note">全属性抵抗弱化は通常の属性弱化120%上限とは別枠で加算されます。</p>${html}<div class="gs-source-note">「レベル2000以降の獲得経験値」はLv1～5で5 / 10 / 15 / 20 / 25％増加します。必要ギルドポイントは5,000 / 10,000 / 15,000 / 20,000 / 25,000です。<br><a href="https://sokomin.github.io/korea/koreaupdate20240904_level.html">韓国 2024年9月アップデート情報</a></div>`;
      }

      function renderStatues() {
        const cards = STATUES.map((statue) => {
          const active = statueActive(statue);
          const rows = statue.parts.map((part, index) => {
            const level = statueLevel(statue.id, index);
            const options = [0, 1, 2, 3, 4, 5].map((value) => `<option value="${value}" ${level === value ? 'selected' : ''}>${value === 0 ? '未完成' : `Lv ${value}`}</option>`).join('');
            return `<tr><th>${part[0]}</th><td>${part[1]}</td><td><select class="gs-select" data-statue="${statue.id}" data-part="${index}">${options}</select></td></tr>`;
          }).join('');
          return `<section class="gs-statue-card"><h3>${statue.name}<span class="gs-statue-status ${active ? 'is-active' : ''}">${active ? '有効' : '3部位で有効'}</span></h3><div class="gs-table-wrap"><table id="table10"><tbody><tr><th>部位</th><th>効果</th><th>完成Lv</th></tr>${rows}</tbody></table></div></section>`;
        }).join('');
        $('gs-statues').innerHTML = `<h2>ギルド石像</h2><p class="gs-note">各石像は完成部位が3つ以上になると、その石像で完成している部位の効果がすべて有効になります。</p><div class="gs-statue-grid">${cards}</div>`;
      }

      function renderTabs() {
        $('gs-tabs').innerHTML = TABS.map((tab) => {
          const selected = state.activeTab === tab.id;
          return `<button type="button" class="gs-tab" id="gs-tab-${tab.id}" role="tab" aria-selected="${selected}" aria-controls="${tab.panelId}" tabindex="${selected ? '0' : '-1'}" data-tab="${tab.id}">${tab.label}</button>`;
        }).join('');
        document.querySelectorAll('[data-tab-panel]').forEach((panel) => {
          const selected = panel.dataset.tabPanel === state.activeTab;
          panel.hidden = !selected;
          panel.setAttribute('aria-labelledby', `gs-tab-${panel.dataset.tabPanel}`);
        });
      }

      function bindEvents() {
        $('gs-guild-level').addEventListener('change', (event) => {
          state.guildLv = Math.max(1, Math.min(200, Math.floor(Number(event.target.value) || 1)));
          pruneSkills();
          render();
        });
        $('gs-heavenly-bonus').addEventListener('change', (event) => {
          state.heavenlyBonus = Math.max(0, Math.min(40, Math.floor(Number(event.target.value) || 0)));
          pruneSkills();
          render();
        });
        $('gs-position').addEventListener('change', (event) => { state.position = event.target.value; render(); });
        $('gs-job').addEventListener('change', (event) => { state.job = Number(event.target.value); render(); });
        $('gs-rebirth').addEventListener('change', (event) => { state.rebirth = Number(event.target.value); render(); });
        $('gs-reset').addEventListener('click', () => {
          state.guildLv = 200;
          state.heavenlyBonus = 0;
          state.position = 'new';
          state.job = 0;
          state.rebirth = 0;
          state.skills = {};
          state.statues = {};
          state.flag = {};
          render();
        });
        document.querySelectorAll('[data-tab]').forEach((button) => button.addEventListener('click', () => {
          state.activeTab = button.dataset.tab;
          render();
        }));
        document.querySelectorAll('[data-skill]').forEach((button) => button.addEventListener('click', () => {
          const skill = skillByKey(button.dataset.skill);
          const delta = Number(button.dataset.delta) || 0;
          if (!skill || !delta) return;
          const current = Number(state.skills[skill.key]) || 0;
          if (delta > 0 && (usedPoints() >= guildPointCap() || !prerequisitesMet(skill))) return;
          const next = Math.max(0, Math.min(skill.max, current + delta));
          if (next) state.skills[skill.key] = next;
          else delete state.skills[skill.key];
          pruneSkills();
          render();
        }));
        document.querySelectorAll('[data-skill-max]').forEach((button) => button.addEventListener('click', () => {
          const skill = skillByKey(button.dataset.skillMax);
          if (!skill || !prerequisitesMet(skill)) return;
          const current = Number(state.skills[skill.key]) || 0;
          const available = Math.max(0, guildPointCap() - usedPoints());
          const next = Math.min(skill.max, current + available);
          if (next > current) state.skills[skill.key] = next;
          render();
        }));
        document.querySelectorAll('[data-flag]').forEach((select) => select.addEventListener('change', () => {
          const effect = FLAG_EFFECTS.find((entry) => entry.key === select.dataset.flag);
          if (!effect) return;
          const level = Math.max(0, Math.min(effect.values.length, Math.floor(Number(select.value) || 0)));
          if (level) state.flag[effect.key] = level;
          else delete state.flag[effect.key];
          render();
        }));
        document.querySelectorAll('[data-statue]').forEach((select) => select.addEventListener('change', () => {
          const statueId = select.dataset.statue;
          const partIndex = Number(select.dataset.part);
          const level = Math.max(0, Math.min(5, Math.floor(Number(select.value) || 0)));
          if (!state.statues[statueId]) state.statues[statueId] = {};
          if (level) state.statues[statueId][partIndex] = level;
          else delete state.statues[statueId][partIndex];
          if (!Object.keys(state.statues[statueId]).length) delete state.statues[statueId];
          render();
        }));
      }

      function render() {
        renderSettings();
        renderSummary();
        renderSkills();
        renderStatues();
        renderFlags();
        renderTabs();
        bindEvents();
      }

      render();
    })();
  </script>
</body>

</html>
